services:
  # --- S3 COMPATIBLE STORAGE (MINIO) ---
  minio:
    image: minio/minio:latest
    container_name: dev-minio
    ports:
      - "9000:9000" # S3 API Port
      - "9001:9001" # Web Console Port
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - dev-network

  # --- DEV EMAIL SERVICE (MAILPIT) ---
  mailpit:
    image: axllent/mailpit:latest
    container_name: dev-mailpit
    ports:
      - "1025:1025" # SMTP server port
      - "8025:8025" # Web UI port
    volumes:
      - mailpit_data:/data
    networks:
      - dev-network

  # --- SUPABASE SERVICES ---
  # Database (PostgreSQL)
  supabase-db:
    image: supabase/postgres:15.1.1.78
    container_name: supabase-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: postgresqlpassword
    volumes:
      - supabase_db_data:/var/lib/postgresql/data
    networks:
      - dev-network

  # GoTrue (Supabase Auth)
  supabase-auth:
    image: supabase/gotrue:v2.132.0
    container_name: supabase-auth
    depends_on:
      - supabase-db
    ports:
      - "9999:9999"
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      DATABASE_URL: postgres://postgres:postgresqlpassword@supabase-db:5432/postgres?sslmode=disable
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_JWT_SECRET: super-secret-jwt-token-change-me-in-prod
      # Connect Auth to Mailpit for local email testing
      GOTRUE_SMTP_HOST: mailpit
      GOTRUE_SMTP_PORT: 1025
      GOTRUE_SMTP_USER: ""
      GOTRUE_SMTP_PASS: ""
      GOTRUE_SMTP_SENDER_NAME: "Local Dev Auth"
    networks:
      - dev-network

  # PostgREST (Supabase REST API)
  supabase-rest:
    image: postgrest/postgrest:v11.1.0
    container_name: supabase-rest
    depends_on:
      - supabase-db
    ports:
      - "3000:3000"
    environment:
      PGRST_DB_URI: postgres://postgres:postgresqlpassword@supabase-db:5432/postgres
      PGRST_DB_SCHEMA: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: super-secret-jwt-token-change-me-in-prod
    networks:
      - dev-network

volumes:
  minio_data:
  mailpit_data:
  supabase_db_data:

networks:
  dev-network:
    driver: bridge
